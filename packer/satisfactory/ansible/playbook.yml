---
- name: Setup Satisfactory Dedicated Server
  hosts: all
  become: true
  vars:
    steam_user: steam
    steam_home: /home/steam
    steamcmd_dir: /home/steam/steamcmd
    satisfactory_dir: /home/steam/SatisfactoryDedicatedServer
    satisfactory_app_id: "1690800"

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install required packages
      apt:
        name:
          - lib32gcc-s1
          - lib32stdc++6
          - unzip
          - zip
          - curl
          - software-properties-common
        state: present

    - name: Add i386 architecture
      command: dpkg --add-architecture i386
      changed_when: false

    - name: Create steam user
      user:
        name: "{{ steam_user }}"
        shell: /bin/bash
        create_home: yes

    - name: Create steamcmd directory
      file:
        path: "{{ steamcmd_dir }}"
        state: directory
        owner: "{{ steam_user }}"
        group: "{{ steam_user }}"

    - name: Download SteamCMD
      get_url:
        url: https://steamcdn-a.akamaihd.net/client/installer/steamcmd_linux.tar.gz
        dest: /tmp/steamcmd_linux.tar.gz

    - name: Extract SteamCMD
      unarchive:
        src: /tmp/steamcmd_linux.tar.gz
        dest: "{{ steamcmd_dir }}"
        remote_src: yes
        owner: "{{ steam_user }}"
        group: "{{ steam_user }}"

    - name: Install Satisfactory Dedicated Server
      become_user: "{{ steam_user }}"
      command: >
        {{ steamcmd_dir }}/steamcmd.sh
        +force_install_dir {{ satisfactory_dir }}
        +login anonymous
        +app_update {{ satisfactory_app_id }} validate
        +quit
      args:
        creates: "{{ satisfactory_dir }}/FactoryServer.sh"

    - name: Create Satisfactory systemd service
      copy:
        dest: /etc/systemd/system/satisfactory.service
        content: |
          [Unit]
          Description=Satisfactory Dedicated Server
          After=network.target

          [Service]
          Type=simple
          User={{ steam_user }}
          WorkingDirectory={{ satisfactory_dir }}
          ExecStartPre={{ steamcmd_dir }}/steamcmd.sh +force_install_dir {{ satisfactory_dir }} +login anonymous +app_update {{ satisfactory_app_id }} +quit
          ExecStart={{ satisfactory_dir }}/FactoryServer.sh -unattended
          Restart=on-failure
          RestartSec=10

          [Install]
          WantedBy=multi-user.target

    - name: Enable satisfactory service
      systemd:
        name: satisfactory
        enabled: yes
        daemon_reload: yes

    - name: Increase file descriptor limit
      copy:
        dest: /etc/security/limits.d/satisfactory.conf
        content: |
          {{ steam_user }} soft nofile 65536
          {{ steam_user }} hard nofile 65536

    - name: Set kernel parameter for UDP buffer
      sysctl:
        name: "{{ item.key }}"
        value: "{{ item.value }}"
        sysctl_set: yes
        reload: yes
      loop:
        - { key: "net.core.rmem_max", value: "16777216" }
        - { key: "net.core.wmem_max", value: "16777216" }
